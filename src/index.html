<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Task Manager</h1>
      <button id="themeToggle" class="theme-btn" type="button">Moon</button>
    </header>

    <main class="main">
      <div class="add-form">
        <input type="text" id="taskInput" placeholder="Them cong viec...">
        <button id="addBtn" type="button">Them</button>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" type="button">Tat ca</button>
        <button class="filter-btn" data-filter="active" type="button">Dang lam</button>
        <button class="filter-btn" data-filter="done" type="button">Hoan thanh</button>
      </div>
      <ul class="task-list" id="taskList"></ul>
      <div class="stats">
       <div class="stats-row">
          <span id="totalCount">0 cong viec</span>
          <span id="doneCount">0 hoan thanh</span>
       </div>
          <div class="progress-bar">
           <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
